server {
    listen       8080;
    listen  [::]:8080;
    server_name  localhost;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=*, microphone=*, geolocation=(), accelerometer=(), gyroscope=(), magnetometer=(), payment=(), usb=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # CSP without 'unsafe-inline' for scripts; violations are reported to /csp-report.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; font-src 'self' data:; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; report-uri /csp-report;" always;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # CSP reporting endpoint. Logs violation reports.
    location = /csp-report {
        access_log /dev/stdout;
        # In a real deployment with a log collector, proxy_pass would be used here.
        # For now, we return 204 but the request is logged above.
        if ($request_method = OPTIONS) {
            return 204;
        }
        if ($request_method != POST) {
            return 405;
        }
        # Real deployments can forward the body to a log collector here.
        return 204;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}